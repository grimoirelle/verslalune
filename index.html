    <h2 style="text-align:center;">Will you rot with me?</h2>

    <!-- The form tag defines the form. The action attribute specifies where to send the data (a server-side script), and the method attribute specifies the HTTP method (POST is recommended for sensitive data). -->
    <form action="/https://grimoirelle.github.io/verslalune/" method="POST">
        <div style="text-align:center;">
            <!-- The label tag improves accessibility and usability. The "for" attribute must match the input's "id" attribute to bind them. -->
            <label for="name">Name:</label>
            <!-- The input tag creates the input field. The "name" attribute is used to reference the form data on the server side. -->
            <input type="text" id="name" name="user_name" required>
        </div>
        
        <div style="text-align:center;">
            <label for="msg">Message:</label>
            <!-- The textarea tag defines a multi-line text input control for longer messages. -->
            <textarea id="msg" name="user_message" rows="4"></textarea>
        </div>

        <div class="button">
            <!-- The button type="submit" creates a button that submits the form data to the action URL. -->
            <div class="button" style="text-align:center;"><button type="submit">Send Message</button>
        </div>
    </form>
